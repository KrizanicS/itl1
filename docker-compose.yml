services:
  mysql:
    image: mysql:8.0
    container_name: itl1_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: itl1_db
      MYSQL_USER: itl1_user
      MYSQL_PASSWORD: itl1_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - itl1_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: itl1_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - itl1_network

  api:
    image: php:8.2-apache
    container_name: itl1_api
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - itl1_network
    command: >
      bash -c "docker-php-ext-install mysqli pdo pdo_mysql && a2enmod rewrite && apache2-foreground"

volumes:
  mysql_data:

networks:
  itl1_network:
    driver: bridge
